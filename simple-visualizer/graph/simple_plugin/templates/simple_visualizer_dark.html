<style>
    #graph-container {
        width: __WIDTH__px;
        height: __HEIGHT__px;
        border: 1px solid #2d2d2d;
        margin: 12px auto;
        background: #1a1a1a;
        overflow: hidden;
        position: relative;
    }

    .node {
        fill: #5b8fa8;
        stroke: #fff;
        stroke-width: 2px;
        cursor: pointer;
    }

    .node.selected {
        fill: #f4b942;
    }

    .link {
        stroke: #bbb;
        stroke-width: 1.5px;
    }

    marker#arrowhead {
        fill: #999;
    }

    .node-label {
        font-size: 10px;
        pointer-events: none;
        fill: #333;
        text-anchor: middle;
    }

    #node-tooltip {
        position: absolute;
        padding: 10px;
        background: rgba(40, 40, 40, 0.95);
        border: 1px solid #555;
        border-radius: 4px;
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        pointer-events: none;
        display: none;
        z-index: 1000;
        max-width: 300px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    #node-tooltip .tooltip-title {
        font-weight: bold;
        margin-bottom: 6px;
        color: #ff8c00;
        border-bottom: 1px solid #555;
        padding-bottom: 4px;
    }

    #node-tooltip .tooltip-item {
        margin: 4px 0;
    }

    #node-tooltip .tooltip-key {
        color: #5b8fa8;
        font-weight: bold;
    }
</style>

<script id="nodes-data" type="application/json">__NODES_JSON__</script>
<script id="edges-data" type="application/json">__EDGES_JSON__</script>

<div id="graph-container"></div>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script type="text/javascript">
    function render() {
        var graphNodes = JSON.parse(document.getElementById("nodes-data").textContent);
        var graphLinks = JSON.parse(document.getElementById("edges-data").textContent);
        var nodeRadius = __NODE_RADIUS__;
        var selectedNodeId = null;

        // Deep copy nodes to avoid mutation
        graphNodes = graphNodes.map(function (n) { return Object.assign({}, n); });
        graphLinks = graphLinks.map(function (e) { return Object.assign({}, e); });

        var container = document.querySelector("#graph-container");
        var width = container.clientWidth;
        var height = container.clientHeight;

        var svg = d3.select("#graph-container").append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("width", "100%")
            .style("height", "100%");

        var g = svg.append("g");

        var zoomBehavior = d3.zoom()
            .scaleExtent([0.05, 8])
            .on("zoom", function (event) {
                g.attr("transform", event.transform);
                // Communicate zoom state to parent page (for bird view)
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'visualizer-zoom',
                        transform: {
                            x: event.transform.x,
                            y: event.transform.y,
                            k: event.transform.k
                        },
                        width: width,
                        height: height
                    }, '*');
                }
            });
        svg.call(zoomBehavior);

        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 22)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#999");

        var link = g.append("g").selectAll("line")
            .data(graphLinks)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke", "#bbb")
            .attr("stroke-width", 1.5)
            .attr("marker-end", function (d) {
                return d.directed ? "url(#arrowhead)" : null;
            });

        var node = g.append("g").selectAll("circle")
            .data(graphNodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", 14)
            .attr("fill", "#5b8fa8")
            .attr("stroke", "#fff")
            .attr("stroke-width", 2)
            .style("cursor", "pointer");

        var label = g.append("g").selectAll("text")
            .data(graphNodes)
            .enter().append("text")
            .attr("class", "node-label")
            .attr("dy", 26)
            .text(function (d) { return d.id; });

        var tooltip = d3.select("body").append("div")
            .attr("id", "node-tooltip");

        node.on("mouseover", function (event, d) {
            d3.select(this)
                .style("fill", "#ff8c00")
                .attr("r", 18);

            // Send hover message to parent (for cross-view highlighting)
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'node-hover',
                    nodeId: d.id
                }, '*');
            }

            var html = '<div class="tooltip-title">Node: ' + d.id + '</div>';
            if (d.data && Object.keys(d.data).length > 0) {
                for (var key in d.data) {
                    html += '<div class="tooltip-item"><span class="tooltip-key">' + key + ':</span> ' + d.data[key] + '</div>';
                }
            } else {
                html += '<div class="tooltip-item">No attributes</div>';
            }

            tooltip.html(html)
                .style("display", "block")
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px");
        });

        node.on("mouseout", function (event, d) {
            d3.select(this)
                .style("fill", "#5b8fa8")
                .attr("r", 14);

            // Send hover-end message to parent
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'node-hover-end',
                    nodeId: d.id
                }, '*');
            }

            tooltip.style("display", "none");
        });

        node.on("mousemove", function (event) {
            tooltip
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px");
        });

        function ticked() {
            link
                .attr("x1", function (d) { return d.source.x; })
                .attr("y1", function (d) { return d.source.y; })
                .attr("x2", function (d) { return d.target.x; })
                .attr("y2", function (d) { return d.target.y; });

            node
                .attr("cx", function (d) { return d.x; })
                .attr("cy", function (d) { return d.y; });

            label
                .attr("x", function (d) { return d.x; })
                .attr("y", function (d) { return d.y; });
        }

        var linkDistance = graphNodes.length > 40 ? 55 : (graphNodes.length > 20 ? 65 : 80);
        var chargeStrength = graphNodes.length > 40 ? -120 : (graphNodes.length > 20 ? -160 : -200);

        var tickCounter = 0;
        var simulation = d3.forceSimulation(graphNodes)
            .force("link", d3.forceLink(graphLinks).id(function (d) { return d.id; }).distance(linkDistance))
            .force("charge", d3.forceManyBody().strength(chargeStrength))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .on("tick", function() {
                ticked();
                // Send positions to bird view every 15 ticks (reduced overhead)
                tickCounter++;
                if (tickCounter % 15 === 0 && window.parent !== window) {
                    var positions = graphNodes.map(function(n) {
                        return { id: n.id, x: n.x, y: n.y };
                    });
                    window.parent.postMessage({
                        type: 'visualizer-positions',
                        positions: positions,
                        links: graphLinks
                    }, '*');
                }
            })
            .on("end", function() {
                // Send final node positions to parent page (for bird view)
                if (window.parent !== window) {
                    var positions = graphNodes.map(function(n) {
                        return { id: n.id, x: n.x, y: n.y };
                    });
                    window.parent.postMessage({
                        type: 'visualizer-positions',
                        positions: positions,
                        links: graphLinks
                    }, '*');
                }
            });

        node.call(d3.drag()
            .on("start", function (event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            })
            .on("drag", function (event, d) {
                d.fx = event.x;
                d.fy = event.y;
            })
            .on("end", function (event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            })
        );

        // Listen for hover messages from parent (cross-view highlighting)
        window.addEventListener('message', function(event) {
            if (event.data.type === 'node-hover') {
                // Highlight the specified node
                node.each(function(d) {
                    if (d.id === event.data.nodeId) {
                        d3.select(this)
                            .style("fill", "#ff8c00")
                            .attr("r", 18);
                    }
                });
            } else if (event.data.type === 'node-hover-end') {
                // Remove highlight from the specified node
                node.each(function(d) {
                    if (d.id === event.data.nodeId) {
                        d3.select(this)
                            .style("fill", "#5b8fa8")
                            .attr("r", 14);
                    }
                });
            }
        });
    }

    render();
</script>
